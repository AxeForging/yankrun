# structlint configuration for YankRun (Go CLI project)

dir_structure:
  allowedPaths:
    - "."
    - "actions/**"
    - "services/**"
    - "helpers/**"
    - "domain/**"
    - "integration/**"
    - "cmd/**"
    - "internal/**"
    - "doc/**"
    - "docs/**"
    - "test/**"
    - "dist/**"
    - ".claude/**"
    - ".github/**"
  disallowedPaths:
    - "vendor/**"
    - "node_modules/**"
    - "tmp/**"
    - "temp/**"
    - ".git/**"
    - "*.log"
  requiredPaths:
    - "actions"
    - "services"
    - "domain"

file_naming_pattern:
  allowed:
    - "*.go"
    - "*.mod"
    - "*.sum"
    - "*.yaml"
    - "*.yml"
    - "*.json"
    - "*.toml"
    - "*.md"
    - "*.txt"
    - "*.png"
    - "*.jpg"
    - "*.svg"
    - "README*"
    - "LICENSE*"
    - "CHANGELOG*"
    - "Makefile"
    - "Dockerfile*"
    - "*.sh"
    - ".gitignore"
    - ".editorconfig"
    - ".golangci.yml"
    - ".goreleaser.yml"
    - ".github/**"
    - "go.work"
    - "go.work.sum"
  disallowed:
    - "*.env*"
    - ".env*"
    - "*.key"
    - "*.pem"
    - "*.log"
    - "*.tmp"
    - "*.temp"
    - "*~"
    - "*.swp"
    - "*.bak"
    - ".DS_Store"
    - "Thumbs.db"
  required:
    - "go.mod"
    - "README.md"
    - ".gitignore"
    - "*.go"

ignore:
  - ".git"
  - "vendor"
  - "node_modules"
  - "bin"
  - "dist"
  - ".idea"
  - ".vscode"
  - ".DS_Store"
  - "*.log"
  - "*.tmp"
